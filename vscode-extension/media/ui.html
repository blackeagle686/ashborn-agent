<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src {{CSP_SOURCE}} 'unsafe-inline'; script-src {{CSP_SOURCE}} 'unsafe-inline'; img-src {{CSP_SOURCE}} data:;" />
  <title>Ashborn Agent</title>
  <link rel="stylesheet" href="{{CSS_URI}}" />
  <style>
    body { background-color: #1a0f2e !important; }
  </style>
</head>
<body>

  <!-- ── Top Control Bar ─────────────────────────────────────────── -->
  <div class="topbar">
    <div class="topbar-title">
      <img src="{{ASHBORN_ICON_URI}}" class="topbar-logo" />
      <span>Ashborn</span>
    </div>
    <div class="topbar-controls">
      <button id="btn-run"     class="btn btn-primary" title="Run Agent (Plan mode)">✦ Run</button>
      <button id="btn-stop"    class="btn btn-danger"  title="Stop execution">✕</button>
      <button id="btn-reset"   class="btn btn-ghost"   title="Reset session">↻</button>
      <button id="btn-settings" class="btn btn-ghost"   title="Settings">⚙</button>
    </div>
  </div>

  <!-- ── Status Bar ──────────────────────────────────────────────── -->
  <div class="statusbar" id="statusbar">
    <span class="status-dot idle" id="status-dot"></span>
    <span id="status-text">Ready</span>
  </div>

  <!-- ── Chat History ────────────────────────────────────────────── -->
  <div class="chat-container" id="chat-container">
    <div class="welcome">
      <img src="{{ASHBORN_ICON_URI}}" class="welcome-logo" />
      <div class="welcome-title">Ashborn Agent</div>
      <div class="welcome-sub">Your autonomous dev partner.<br/>Describe a task and I'll execute it.</div>
      <div class="welcome-footer">powered by phoenix-ai</div>
    </div>
  </div>

  <!-- ── Input Area ─────────────────────────────────────────────── -->
  <div class="input-area">
    <div class="mode-row">
      <label class="mode-label">Mode:</label>
      <select id="mode-select" class="mode-select">
        <option value="auto">Auto</option>
        <option value="plan">Plan (full loop)</option>
        <option value="fast_ans">Fast Answer</option>
      </select>
    </div>
    <div class="input-row">
      <div id="mention-list" class="mention-list" style="display: none;"></div>
      <textarea
        id="input"
        class="input-box"
        placeholder="Describe your task… (Shift+Enter for newline)"
        rows="3"
      ></textarea>
      <button id="btn-send" class="btn btn-send" title="Send (Enter)">➤</button>
    </div>
  </div>

  <!-- ── Settings Panel (Hidden by default) ─────────────────────── -->
  <div class="settings-panel" id="settings-panel" style="display: none;">
    <div class="settings-header">
      <h3>Settings</h3>
      <button id="btn-close-settings" class="btn-close">✕</button>
    </div>
    <div class="settings-content">
      <div class="setting-item">
        <label>OpenAI API Key</label>
        <input type="password" id="cfg-api-key" placeholder="sk-...">
      </div>
      <div class="setting-item">
        <label>LLM Model</label>
        <select id="cfg-model">
          <option value="gpt-4o">gpt-4o</option>
          <option value="gpt-4o-mini">gpt-4o-mini</option>
          <option value="o1-preview">o1-preview</option>
          <option value="o1-mini">o1-mini</option>
        </select>
      </div>
      <div class="setting-item">
        <label>Log Level</label>
        <select id="cfg-log-level">
          <option value="DEBUG">DEBUG</option>
          <option value="INFO">INFO</option>
          <option value="WARNING">WARNING</option>
          <option value="ERROR">ERROR</option>
        </select>
      </div>
      <button id="btn-save-settings" class="btn btn-primary" style="width: 100%; margin-top: 20px;">Save Configuration</button>
      <div id="settings-status" class="settings-status"></div>
    </div>
  </div>

  <script src="{{JS_URI}}"></script>
</body>
</html>
